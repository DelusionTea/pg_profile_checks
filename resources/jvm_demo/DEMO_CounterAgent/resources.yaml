apiVersion: apps/v1
kind: Deployment
metadata:
  name: counteragent-demo
spec:
  template:
    spec:
      containers:
        - name: application
          resources:
            requests:
              cpu: "2000m"
              memory: "4096Mi"
            limits:
              cpu: "4000m"
              memory: "8192Mi"
        - name: istioProxy
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "600m"
              memory: "1024Mi"
        - name: vaultAgent
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
