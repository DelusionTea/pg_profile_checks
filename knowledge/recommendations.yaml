# Offline playbook: PostgreSQL community recommendations mapped to finding IDs.
# Sources: PostgreSQL official docs, wiki.postgresql.org (Tuning), common DBA practice.

recommendations:
  - id: checkpoints.high_requested_ratio
    severity: high
    title: High ratio of requested checkpoints
    recommendation: |
      Большая доля requested checkpoints означает, что WAL заполняется быстрее,
      чем срабатывают плановые checkpoints. Это типичный признак слишком малого
      max_wal_size или высокой write-нагрузки.
    actions:
      - Увеличить max_wal_size (часто 1–4 GB+ для OLTP под нагрузкой)
      - Проверить wal_buffers_full и общий объём WAL за интервал
      - Сопоставить с checkpoint_timeout — не уменьшать timeout вместо max_wal_size
    references:
      - "PostgreSQL Documentation: Write Ahead Log"
      - "PostgreSQL Documentation: Checkpoints"
      - "PostgreSQL Wiki: Tuning Your PostgreSQL Server"

  - id: checkpoints.high_requested_count
    severity: medium
    title: High absolute count of requested checkpoints
    recommendation: |
      За интервал отчёта зафиксировано много requested checkpoints.
      Сравните нормализованное значение /час с предыдущими прогонами.
    actions:
      - Проверить max_wal_size и рост WAL
      - Оценить пики INSERT/UPDATE и wal-heavy запросы
    references:
      - "PostgreSQL Documentation: WAL Configuration"

  - id: checkpoints.high_requested_per_hour
    severity: medium
    title: High requested checkpoints per hour
    recommendation: |
      Частые requested checkpoints в пересчёте на час указывают на устойчивое
      давление на подсистему записи.
    actions:
      - Увеличить max_wal_size
      - Проверить дисковую подсистему и synchronous_commit
    references:
      - "PostgreSQL Documentation: Resource Consumption"

  - id: checkpoints.high_write_time
    severity: high
    title: Long total checkpoint write time
    recommendation: |
      Длительная запись checkpoint увеличивает IO latency и может влиять на
      время отклика запросов во время checkpoint.
    actions:
      - Проверить производительность диска (IOPS, latency)
      - Оценить checkpoint_completion_target
      - Снизить write-нагрузку или распределить её во времени
    references:
      - "PostgreSQL Documentation: Checkpoints"

  - id: checkpoints.high_write_time_per_hour
    severity: high
    title: High checkpoint write time per hour
    recommendation: |
      Нормализованное время записи checkpoint за час высокое — устойчивое IO-давление
      от checkpoints, а не только длинный единичный интервал отчёта.
    actions:
      - Поднять checkpoint_completion_target (0.7–0.9) для сглаживания записи
      - Согласовать max_wal_size и checkpoint_timeout с объёмом WAL
      - Проверить latency диска (iostat) в окнах checkpoint
    references:
      - "PostgreSQL Documentation: Checkpoints"
      - "Postgres Pro: checkpoint_completion_target"

  - id: checkpoints.maxwritten_clean
    severity: medium
    title: Bgwriter interrupts (maxwritten_clean)
    recommendation: |
      Bgwriter часто прерывается из-за max_write_pages — буферы сбрасываются
      медленнее, чем backend их загрязняет.
    actions:
      - Увеличить shared_buffers при низком cache hit
      - Настроить bgwriter (в новых версиях часто autotune)
      - Проверить checkpoint и WAL pressure
    references:
      - "PostgreSQL Wiki: Tuning Your PostgreSQL Server"

  - id: wal.buffers_full
    severity: high
    title: WAL buffers frequently full
    recommendation: |
      wal_buffers переполняется — процессы ждут освобождения WAL buffer.
      Типичная рекомендация коммьюнити: увеличить wal_buffers (часто 64MB на busy systems).
    actions:
      - Увеличить wal_buffers (единицы 8kB в pg_profile settings)
      - Проверить пики WAL generation
    references:
      - "PostgreSQL Documentation: wal_buffers"

  - id: wal.low_max_wal_size
    severity: medium
    title: max_wal_size below recommended minimum
    recommendation: |
      Слишком малый max_wal_size приводит к частым requested checkpoints.
    actions:
      - Увеличить max_wal_size согласно нагрузке и доступному диску
    references:
      - "PostgreSQL Documentation: max_wal_size"

  - id: wal.high_generation_rate
    severity: medium
    title: High WAL generation rate
    recommendation: |
      Высокая скорость генерации WAL — ожидаемо при массовых DML, но требует
      достаточного max_wal_size и мониторинга диска.
    actions:
      - Найти wal-heavy запросы и таблицы
      - Проверить архивацию/replication lag при наличии
    references:
      - "PostgreSQL Documentation: Write Ahead Log"

  - id: queries.slow_execution
    severity: high
    title: Slow SQL queries detected
    recommendation: |
      Запросы с высоким mean/max/total execution time — кандидаты на оптимизацию
      плана, индексов или переписывания SQL.
    actions:
      - Выполнить EXPLAIN (ANALYZE, BUFFERS) для топ-запросов
      - Проверить индексы и статистику (ANALYZE)
      - Оценить work_mem при temp spills
    references:
      - "PostgreSQL Documentation: Using EXPLAIN"
      - "PostgreSQL Wiki: Performance Optimization"

  - id: autovacuum.disabled
    severity: critical
    title: Autovacuum is disabled
    recommendation: |
      autovacuum=off — критическая misconfiguration для production OLTP.
      Коммьюнити однозначно рекомендует держать autovacuum включённым.
    actions:
      - Включить autovacuum немедленно
      - Проверить таблицы с bloat после включения
    references:
      - "PostgreSQL Documentation: Automatic Vacuuming"

  - id: autovacuum.table_high_dead_pct
    severity: high
    title: High dead tuples ratio on table
    recommendation: |
      Высокий процент мёртвых строк — autovacuum не успевает или заблокирован
      long transactions.
    actions:
      - Проверить idle in transaction и lock waits
      - Настроить per-table autovacuum при необходимости
      - Рассмотреть VACUUM (ANALYZE) в окно обслуживания
    references:
      - "PostgreSQL Documentation: Routine Vacuuming"
      - "PostgreSQL Wiki: Don't Do This (long transactions)"

  - id: autovacuum.naptime_high
    severity: medium
    title: autovacuum_naptime too high
    recommendation: |
      Большой naptime замедляет реакцию autovacuum на bloat.
      Для OLTP часто используют 15–60 сек, не минуты.
    actions:
      - Уменьшить autovacuum_naptime
      - Мониторить dead tuples после изменения
    references:
      - "PostgreSQL Documentation: Cost-Based Vacuum Delay"

  - id: autovacuum.table_high_mods_pct
    severity: high
    title: High modified tuples ratio since analyze
    recommendation: |
      Высокий n_mod_since_analyze — статистика устаревает, планировщик может выбирать
      плохие планы. Autovacuum analyze не успевает за DML.
    actions:
      - Снизить autovacuum_analyze_scale_factor / threshold на горячих таблицах
      - Ускорить autovacuum (naptime, cost_delay/limit)
      - Выполнить ANALYZE в окно обслуживания при необходимости
    references:
      - "PostgreSQL Documentation: Routine Vacuuming"
      - "Postgres Pro: autovacuum analyze thresholds"

  - id: autovacuum.table_many_dead_tuples
    severity: high
    title: Large absolute dead tuple count
    recommendation: |
      Большой абсолютный объём мёртвых строк на крупных таблицах — vacuum lag,
      даже если процент dead ещё умеренный.
    actions:
      - Ускорить autovacuum (cost_limit ↑, cost_delay ↓, maintenance_work_mem ↑)
      - Проверить idle in transaction и long transactions
      - Per-table autovacuum для hot tables
    references:
      - "PostgreSQL Documentation: Automatic Vacuuming"

  - id: autovacuum.stale_vacuum
    severity: high
    title: Stale autovacuum on active table
    recommendation: |
      Давно не было autovacuum на таблице с активностью — риск bloat и wraparound.
    actions:
      - Проверить блокировки vacuum (idle in transaction, lock waits)
      - Уменьшить naptime / усилить cost-параметры
      - Ручной VACUUM (ANALYZE) в окно обслуживания
    references:
      - "PostgreSQL Documentation: Routine Vacuuming"
      - "pg_stat_all_tables: last_autovacuum"

  - id: autovacuum.cost_delay_high
    severity: medium
    title: autovacuum_vacuum_cost_delay too high
    recommendation: |
      Высокий cost_delay «душит» autovacuum — очистка не успевает за write-нагрузкой.
    actions:
      - Снизить autovacuum_vacuum_cost_delay (осторожно на shared storage)
      - Мониторить IO и dead tuples после изменения
    references:
      - "PostgreSQL Documentation: Cost-Based Vacuum Delay"
      - "Postgres Pro: autovacuum_vacuum_cost_delay"

  - id: autovacuum.cost_limit_low
    severity: medium
    title: autovacuum_vacuum_cost_limit too low
    recommendation: |
      Низкий cost_limit даёт vacuum малый IO-бюджет — типичная причина медленной очистки
      на busy OLTP.
    actions:
      - Увеличить autovacuum_vacuum_cost_limit
      - Согласовать с cost_delay и нагрузкой на диск
    references:
      - "PostgreSQL Documentation: Cost-Based Vacuum Delay"
      - "Postgres Pro: autovacuum cost parameters"

  - id: sessions.high_idle_in_transaction
    severity: critical
    title: High idle in transaction time
    recommendation: |
      Долгие idle in transaction сессии держат snapshots, блокируют vacuum
      и увеличивают bloat — одна из самых частых рекомендаций коммьюнити.
    actions:
      - Установить idle_in_transaction_session_timeout
      - Исправить application connection pooling / missing COMMIT
      - Найти источник зависших транзакций в pg_stat_activity
    references:
      - "PostgreSQL Documentation: idle_in_transaction_session_timeout"
      - "PostgreSQL Wiki: Lock Monitoring"

  - id: sessions.idle_timeout_disabled
    severity: critical
    title: idle_in_transaction_session_timeout is zero
    recommendation: |
      Таймаут отключён при наличии idle in transaction — нет защиты от утечки сессий.
    actions:
      - Установить idle_in_transaction_session_timeout (например 60s–300s)
    references:
      - "PostgreSQL Documentation: Client Connection Defaults"

  - id: memory.statement_timeout_zero
    severity: medium
    title: statement_timeout is disabled
    recommendation: |
      Без statement_timeout runaway-запросы могут выполняться бесконечно.
      Коммьюнити рекомендует задавать разумный timeout на уровне роли/БД.
    actions:
      - Установить statement_timeout для application roles
      - Отдельный лимит для batch/ETL при необходимости
    references:
      - "PostgreSQL Documentation: statement_timeout"

  - id: memory.lock_timeout_zero
    severity: medium
    title: lock_timeout is disabled
    recommendation: |
      Без lock_timeout приложение может бесконечно ждать блокировку,
      создавая каскадные задержки.
    actions:
      - Установить lock_timeout для OLTP workload
    references:
      - "PostgreSQL Documentation: lock_timeout"

  - id: memory.work_mem_connections_risk
    severity: high
    title: work_mem * max_connections memory risk
    recommendation: |
      Теоретический пик памяти при одновременных sort/hash операциях =
      work_mem × connections. Коммьюнити предупреждает об OOM на таких конфигурациях.
    actions:
      - Снизить work_mem или max_connections
      - Использовать connection pooler (PgBouncer)
      - Задать work_mem на уровне роли для тяжёлых запросов
    references:
      - "PostgreSQL Wiki: Tuning Your PostgreSQL Server"
      - "PostgreSQL Documentation: work_mem"

  - id: memory.work_mem_high
    severity: medium
    title: work_mem above typical OLTP band
    recommendation: |
      Глобально высокий work_mem увеличивает риск OOM при конкурентных sort/hash.
      Для тяжёлых запросов безопаснее role/session-level, а не завышенный default.
    actions:
      - Снизить глобальный work_mem до типичного OLTP диапазона
      - Вынести повышенный work_mem на роли отчётности/ETL
      - Проверить temp spill после изменения
    references:
      - "PostgreSQL Documentation: work_mem"
      - "Postgres Pro: resource consumption"

  - id: memory.shared_buffers_low
    severity: medium
    title: shared_buffers below recommended minimum
    recommendation: |
      Малый shared_buffers на выделенном сервере часто даёт низкий cache hit и лишний disk IO.
      Postgres Pro ориентирует ~25% RAM на выделенном хосте (с учётом политики).
    actions:
      - Увеличить shared_buffers (restart) после оценки RAM и working set
      - Согласовать effective_cache_size и HugePages
      - Пересчитать max_wal_size после роста буферов
    references:
      - "Postgres Pro: shared_buffers"
      - "PostgreSQL Wiki: Tuning Your PostgreSQL Server"

  - id: memory.huge_pages_recommended
    severity: warning
    title: HugePages recommended for large shared_buffers
    recommendation: |
      При большом shared_buffers Postgres Pro рекомендует использовать huge pages:
      снижается overhead TLB при работе с большими непрерывными блоками shared memory.
      Значение huge_pages=try (default) при нехватке страниц в ОС тихо откатывается
      на обычные 4kB — сервер стартует, но выгода HugePages теряется без явного сигнала.
      Предпочтительно huge_pages=on после резервирования vm.nr_hugepages.
    actions:
      - "Узнать потребность: SHOW shared_memory_size_in_huge_pages / postgres -C shared_memory_size_in_huge_pages"
      - "Зарезервировать страницы в ОС: vm.nr_hugepages ≥ shared_memory_size_in_huge_pages (+ запас)"
      - "Отключить Transparent Huge Pages (THP) на хосте БД"
      - "Установить huge_pages=on в postgresql.conf и выполнить restart"
      - "Проверить /proc/meminfo (HugePages_Total/Free) и старт postmaster без fallback"
    references:
      - "Postgres Pro Documentation: 18.4 Managing Kernel Resources — Linux Huge Pages"
      - "https://postgrespro.ru/docs/enterprise/current/kernel-resources"
      - "PostgreSQL Documentation: huge_pages / shared_memory_size_in_huge_pages"

  - id: cache.low_hit_ratio
    severity: high
    title: Low buffer cache hit ratio
    recommendation: |
      Низкий blks_hit_pct — данные часто читаются с диска. Проверьте размер
      shared_buffers и working set БД.
    actions:
      - Увеличить shared_buffers (ориентир 25% RAM, с учётом политики банка)
      - Проверить effective_cache_size для планировщика
      - Найти таблицы с высоким physical read
    references:
      - "PostgreSQL Wiki: Tuning Your PostgreSQL Server"
      - "PostgreSQL Documentation: shared_buffers"

  - id: cache.low_table_hit_ratio
    severity: high
    title: Low table I/O hit ratio
    recommendation: |
      Горячие таблицы читаются с диска чаще ожидаемого — узкий buffer pool,
      холодный working set или неоптимальные планы/индексы.
    actions:
      - Найти top I/O tables в pg_profile и проверить индексы/partitioning
      - Оценить shared_buffers и effective_cache_size
      - EXPLAIN (ANALYZE, BUFFERS) для запросов к этим таблицам
    references:
      - "pg_profile top I/O tables"
      - "Postgres Pro: shared_buffers; caching"

  - id: cache.low_slru_hit_ratio
    severity: medium
    title: Low SLRU cache hit ratio
    recommendation: |
      Низкий hit по SLRU (clog/multixact и др.) увеличивает IO на служебные структуры.
      Часто связано с длинными транзакциями, idle in transaction или высокой конкуренцией.
    actions:
      - Сократить idle in transaction и long transactions
      - Проверить нагрузку на multixact/subtrans при необходимости
      - Сверить с sessions/autovacuum findings
    references:
      - "PostgreSQL Documentation: Resource Consumption"
      - "pg_stat_slru / pg_profile SLRU"

  - id: io.high_seq_scan
    severity: medium
    title: High sequential scans on table
    recommendation: |
      Много seq scan при низком idx_scan — возможно отсутствует индекс
      или планировщик выбирает seq scan из-за статистики/настроек.
    actions:
      - EXPLAIN проблемных запросов
      - Добавить индекс или обновить статистику (ANALYZE)
    references:
      - "PostgreSQL Documentation: Indexes"

  - id: io.unused_index
    severity: low
    title: Unused index
    recommendation: |
      Неиспользуемый индекс замедляет INSERT/UPDATE/DELETE и vacuum без пользы для чтения.
      Коммьюнити рекомендует периодически удалять unused indexes.
    actions:
      - Подтвердить отсутствие использования на длинном интервале
      - Удалить индекс в согласованное окно
    references:
      - "PostgreSQL Wiki: Index Maintenance"

  - id: io.wal_heavy_query
    severity: medium
    title: WAL-heavy SQL query
    recommendation: |
      Запрос генерирует много WAL — типично для массовых INSERT/UPDATE.
      Проверьте batch size и индексы на горячих таблицах.
    actions:
      - Оптимизировать batch DML
      - Проверить fillfactor и индексы на целевых таблицах
    references:
      - "PostgreSQL Documentation: Write Ahead Log"

  - id: io.high_io_wait_query
    severity: high
    title: High I/O wait on SQL query
    recommendation: |
      Запрос тратит много времени на чтение/запись блоков — кандидат на план,
      индексы, cache hit или проблемы storage.
    actions:
      - EXPLAIN (ANALYZE, BUFFERS) для топ SQL по io_time
      - Проверить hit ratio и physical reads по затронутым таблицам
      - Оценить disk latency и track_io_timing
    references:
      - "PostgreSQL Documentation: Using EXPLAIN"
      - "Postgres Pro: I/O and storage"

  - id: io.temp_spill_query
    severity: high
    title: Temporary spill on SQL query
    recommendation: |
      Запрос пишет во временные файлы (sort/hash spill) — нехватка work_mem
      для операции или избыточный объём данных в плане.
    actions:
      - EXPLAIN (ANALYZE, BUFFERS) и найти Sort/Hash Aggregate со spill
      - Поднять work_mem точечно на роль/сессию (не глобально без оценки)
      - Упростить запрос / добавить индексы, снижающие объём сортировки
    references:
      - "PostgreSQL Documentation: work_mem"
      - "Postgres Pro: temporary files"

  - id: io.hot_index_reads
    severity: medium
    title: Hot index physical reads
    recommendation: |
      Индекс активно читается с диска — давление на cache или неоптимальный доступ.
    actions:
      - Проверить размер индекса и hit ratio таблицы
      - Оценить shared_buffers / OS cache и планы, использующие индекс
      - Рассмотреть covering/partial index при подтверждённом паттерне
    references:
      - "pg_profile top I/O indexes"
      - "PostgreSQL Documentation: Indexes"

  - id: io.table_growth
    severity: medium
    title: Fast-growing table
    recommendation: |
      Таблица заметно растёт за интервал отчёта — риск диска, vacuum lag и деградации планов.
    actions:
      - Проверить DML-паттерн и возможность partitioning/архивации
      - Убедиться, что autovacuum успевает за ростом
      - Оценить tablespace / свободное место
    references:
      - "pg_profile top growing tables"
      - "Postgres Pro: table maintenance"

  - id: io.index_growth
    severity: medium
    title: Fast-growing index
    recommendation: |
      Быстрый рост индекса увеличивает write/vacuum cost и место на диске.
    actions:
      - Проверить необходимость индекса и fillfactor
      - Сопоставить с unused indexes и DML на таблице
      - Планировать REINDEX в окно обслуживания при bloat
    references:
      - "pg_profile top growing indexes"
      - "PostgreSQL Wiki: Index Maintenance"

  - id: io.vacuum_ops_pressure
    severity: medium
    title: High vacuum/analyze operation count
    recommendation: |
      Много vacuum/analyze операций на таблице — высокая churn или агрессивные пороги;
      конкурирует с пользовательской нагрузкой за IO/CPU.
    actions:
      - Проверить dead/mods % и per-table autovacuum settings
      - Снизить ненужный churn (idle in xact, частые мелкие UPDATE)
      - Согласовать окно обслуживания для тяжёлого VACUUM
    references:
      - "pg_profile vacuum-related statistics"
      - "PostgreSQL Documentation: Automatic Vacuuming"

  - id: db.statement_dominance
    severity: medium
    title: One database dominates statement load
    recommendation: |
      Одна БД кластера забирает львиную долю времени/вызовов statements —
      фокус тюнинга и расследования должен быть на ней.
    actions:
      - Сузить анализ top SQL / rusage к доминирующей БД
      - Проверить temp/JIT/WAL stats этой БД в statements_dbstats
      - Сверить нагрузку приложения и connection pool по БД
    references:
      - "pg_profile statement statistics by database"

  - id: wal.backend_writes_high
    severity: medium
    title: High backend write ratio
    recommendation: |
      Backend'ы сами пишут dirty buffers чаще ожидаемого — bgwriter/checkpoint
      не успевают, растёт latency пользовательских сессий.
    actions:
      - Проверить shared_buffers, bgwriter и checkpoint_completion_target
      - Сопоставить с maxwritten_clean и checkpoint write time
      - Оценить write-heavy SQL и batch DML
    references:
      - "PostgreSQL Wiki: Tuning Your PostgreSQL Server"
      - "Postgres Pro: bgwriter / checkpoints"

  - id: disk.tablespace_growth
    severity: high
    title: Tablespace size growth
    recommendation: |
      Tablespace заметно вырос за интервал — риск заполнения диска и деградации IO.
    actions:
      - Проверить свободное место на томах tablespace
      - Найти растущие таблицы/индексы в pg_profile
      - Спланировать архивацию, partitioning или расширение storage
    references:
      - "pg_profile tablespace statistics"
      - "Postgres Pro: tablespaces"

  - id: sessions.connection_pressure
    severity: high
    title: Connection / session pressure
    recommendation: |
      Высокая утилизация соединений или много idle-сессий — риск исчерпания
      max_connections и лишней памяти на backends.
    actions:
      - Внедрить/проверить PgBouncer (transaction pooling где возможно)
      - Снизить max_connections после появления pooler
      - Найти утечки соединений в приложении
    references:
      - "PostgreSQL Wiki: Number of Database Connections"
      - "Postgres Pro: max_connections; connection pooling"

  - id: locks.deadlocks
    severity: critical
    title: Deadlocks detected
    recommendation: |
      Deadlocks указывают на несогласованный порядок блокировок в приложении.
    actions:
      - Анализировать deadlock graph в логах
      - Унифицировать порядок UPDATE таблиц в транзакциях
    references:
      - "PostgreSQL Documentation: Deadlocks"

  - id: settings.generic
    severity: medium
    title: PostgreSQL setting differs between environments
    recommendation: |
      Параметр явно задан (Defined) в одной среде и отличается от другой.
      Убедитесь, что расхождение намеренное и соответствует политике банка.
    actions:
      - Сверить с guc_guidance.yaml для данного параметра
      - Документировать обоснование расхождения
    references:
      - "PostgreSQL Documentation: Runtime Configuration"

  - id: checkpoints.generic
    severity: medium
    title: Checkpoint metric anomaly
    recommendation: Review checkpoint-related metrics against WAL and storage tuning guides.
    actions:
      - Compare with previous test runs using compare_runs.py
    references:
      - "PostgreSQL Documentation: Checkpoints"

  - id: autovacuum.generic
    severity: medium
    title: Autovacuum-related finding
    recommendation: Review autovacuum GUC and table bloat metrics.
    actions:
      - Check autovacuum settings and long-running transactions
    references:
      - "PostgreSQL Documentation: Automatic Vacuuming"

  - id: sessions.generic
    severity: medium
    title: Session/transaction anomaly
    recommendation: Review session metrics and application transaction handling.
    actions:
      - Inspect pg_stat_activity patterns during load test
    references:
      - "PostgreSQL Documentation: Monitoring"

  - id: memory.generic
    severity: medium
    title: Memory configuration finding
    recommendation: Review memory-related GUC settings against hardware and workload.
    actions:
      - Validate work_mem, shared_buffers, maintenance_work_mem
    references:
      - "PostgreSQL Wiki: Tuning Your PostgreSQL Server"

  - id: cache.generic
    severity: medium
    title: Cache or I/O read finding
    recommendation: Review cache hit ratios and disk read patterns.
    actions:
      - Identify tables with high physical reads
    references:
      - "PostgreSQL Documentation: Resource Consumption"

  - id: io.generic
    severity: medium
    title: I/O pattern finding
    recommendation: Review query plans and table access patterns.
    actions:
      - Use EXPLAIN and pg_profile top I/O sections
    references:
      - "PostgreSQL Documentation: Performance Tips"

  - id: wal.generic
    severity: medium
    title: WAL-related finding
    recommendation: Review WAL generation and checkpoint configuration.
    actions:
      - Check max_wal_size and wal_buffers
    references:
      - "PostgreSQL Documentation: WAL Configuration"

  - id: run_compare.generic
    severity: medium
    title: Metric changed between test runs
    recommendation: |
      Метрика изменилась между прогонами. При разной длительности интервалов
      ориентируйтесь на значения /час, а не только на абсолютные счётчики.
    actions:
      - Сравнить per-hour значения
      - Сопоставить с изменениями нагрузки или конфигурации
    references:
      - "Internal: compare_runs.py output"
