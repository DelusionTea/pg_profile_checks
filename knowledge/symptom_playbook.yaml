# Symptom investigation playbook: possible causes and verification steps.
# Used by pgprofile_symptoms.py — evidence from pg_profile augments these templates.

symptoms:
  high_cpu:
    title: Высокая утилизация CPU БД
    description: |
      Симптом: высокая загрузка CPU процессами PostgreSQL. pg_profile показывает CPU через
      pg_stat_kcache (top_rusage_statements) и active_time на уровне БД.
    causes:
      - id: cpu.dominant_queries
        title: Доминирующие SQL по CPU (pg_stat_kcache)
        description: Несколько запросов потребляют большую долю user/system CPU за интервал.
        confirm_actions:
          - "EXPLAIN (ANALYZE, BUFFERS) для топ-3 SQL по sum_cpu_time из отчёта"
          - "Сопоставить pg_stat_statements (calls, mean_exec_time) с pg_stat_kcache (sum_cpu_time)"
          - "Проверить, совпадает ли пик CPU на OS с интервалом отчёта pg_profile"
        refute_actions:
          - "Если sum_cpu_time топ-запросов <5% интервала — CPU уходит не в SQL (фон, autovacuum, checkpoint)"
          - "Сравнить топ CPU между двумя периодами: запрос исчез из топа — не корневая причина текущего пика"

      - id: cpu.high_call_volume
        title: Высокий объём вызовов (CPU × calls)
        description: Умеренное mean_exec_time при очень большом calls даёт высокий суммарный CPU.
        confirm_actions:
          - "Проверить calls и total_exec_time в top_statements для топ CPU запросов"
          - "Найти источник частых вызовов (ORM N+1, polling, отсутствие pool)"
        refute_actions:
          - "Если calls низкий при высоком CPU — причина не в частоте, а в тяжёлом плане/функции"

      - id: cpu.jit_overhead
        title: JIT-компиляция запросов
        description: JIT включён и топ SQL имеет заметный jit_total_time.
        confirm_actions:
          - "Проверить jit_* поля в top_statements для медленных/тяжёлых запросов"
          - "Сравнить plan time vs exec time; jit_generation_time в pg_profile"
          - "Тест с SET jit=off для подозрительного запроса на НТ"
        refute_actions:
          - "jit_total_time отсутствует или << total_exec_time — JIT не доминирует"

      - id: cpu.autovacuum_pressure
        title: Autovacuum / analyze во время нагрузки
        description: Bloat, stale vacuum, высокий mods/dead_pct — autovacuum конкурирует за CPU.
        confirm_actions:
          - "Проверить top_tbl_last_sample: dead_pct, mods_pct, last_autovacuum"
          - "pg_stat_activity: autovacuum workers в пик CPU"
          - "Логи autovacuum (log_autovacuum_min_duration)"
        refute_actions:
          - "Нет таблиц с высоким dead_pct и autovacuum свежий — маловероятно"

      - id: cpu.checkpoint_bgwriter
        title: Checkpoint / bgwriter / IO wait в kernel CPU
        description: Высокий system_time, checkpoint write, maxwritten_clean — kernel CPU на запись.
        confirm_actions:
          - "cluster_stats: checkpoints_req, checkpoint_write_time, maxwritten_clean"
          - "Сопоставить system_time_pct в top_rusage с WAL/checkpoint метриками"
        refute_actions:
          - "checkpoints_req низкий и checkpoint_write_time мал — не checkpoint"

      - id: cpu.parallel_workers
        title: Параллельные запросы / max_parallel_workers
        description: Много parallel workers увеличивают суммарный CPU.
        confirm_actions:
          - "EXPLAIN: Gather / Parallel Seq Scan в топ SQL"
          - "Проверить max_parallel_workers_per_gather и load"
        refute_actions:
          - "Планы без parallel nodes при высоком CPU — ищите другие причины"

      - id: cpu.huge_pages_tlb
        title: TLB pressure без HugePages (большой shared_buffers)
        description: |
          При большом shared_buffers и huge_pages=try/off растёт system CPU из‑за TLB miss.
          Postgres Pro рекомендует huge pages для крупных shared memory сегментов.
        confirm_actions:
          - "SHOW shared_buffers, huge_pages, shared_memory_size_in_huge_pages"
          - "Сравнить system_time в top_rusage до/после huge_pages=on на НТ"
          - "/proc/meminfo: HugePages_Total/Free vs потребность инстанса"
        refute_actions:
          - "huge_pages=on и страницы зарезервированы — не эта причина"
          - "shared_buffers небольшой (<2GB) — эффект HugePages обычно слабый"

  high_memory:
    title: Высокое потребление памяти БД
    description: |
      Симптом: рост RSS PostgreSQL, OOM risk, swap. pg_profile: temp spill, work_mem × connections,
      shared_buffers, bloat.
    causes:
      - id: memory.work_mem_risk
        title: work_mem × max_connections (OOM risk)
        description: Высокий work_mem при большом числе connections — риск исчерпания RAM.
        confirm_actions:
          - "Сверить work_mem и max_connections из settings с политикой банка"
          - "Оценить peak connections (pg_stat_activity / dbstat.sessions)"
          - "Мониторинг RSS postgres процессов vs work_mem × active queries"
        refute_actions:
          - "work_mem умеренный и connections стабильно ниже max — риск ниже"

      - id: memory.temp_spill
        title: Spill в temp files (sort/hash на диск)
        description: temp_blks_written / temp_bytes — запросы превышают work_mem.
        confirm_actions:
          - "top_statements: temp_blks_written, temp_blk_write_time для топ SQL"
          - "dbstat.temp_bytes / temp_files за интервал"
          - "EXPLAIN (ANALYZE): Sort/Hash batches to disk"
        refute_actions:
          - "temp_bytes и temp_blks_written минимальны — spill не причина"

      - id: memory.shared_buffers_pressure
        title: Недостаточный shared_buffers / cache miss
        description: Низкий blks_hit_pct — частые чтения с диска, давление на page cache.
        confirm_actions:
          - "dbstat.blks_hit_pct, top_io_tables.heap_blks_read"
          - "Сравнить shared_buffers с RAM и working set"
        refute_actions:
          - "blks_hit_pct >99% — память БД скорее в connections/temp, не в buffer cache"

      - id: memory.huge_pages_missing
        title: HugePages не включены при большом shared_buffers
        description: |
          shared_buffers ≳ 2GB при huge_pages=try/off: Postgres Pro рекомендует huge pages
          для снижения TLB overhead. try может тихо работать на 4kB без явной ошибки.
        confirm_actions:
          - "SHOW shared_buffers, huge_pages, shared_memory_size_in_huge_pages"
          - "Сверить vm.nr_hugepages и /proc/meminfo HugePages_* с потребностью инстанса"
          - "Убедиться, что THP отключены; сравнить system CPU до/после huge_pages=on"
        refute_actions:
          - "huge_pages=on и HugePages_Total ≥ shared_memory_size_in_huge_pages — уже настроено"
          - "shared_buffers заметно меньше 2GB — выгода HugePages обычно невелика"

      - id: memory.maintenance_bloat
        title: Bloat / dead tuples / maintenance_work_mem
        description: Крупные таблицы с bloat увеличивают memory footprint vacuum и scans.
        confirm_actions:
          - "top_tbl_last_sample: dead_pct, n_dead_tup, table size"
          - "pgstattuple / pg_stat_user_tables на подозрительных таблицах"
        refute_actions:
          - "dead_pct низкий на крупных таблицах — bloat маловероятен"

      - id: memory.idle_in_transaction
        title: Idle in transaction (утечка snapshots / памяти)
        description: Долгие idle in transaction держат память и блокируют cleanup.
        confirm_actions:
          - "dbstat.idle_in_transaction_time, sessions idle in pg_stat_activity"
          - "Проверить idle_in_transaction_session_timeout"
        refute_actions:
          - "idle_in_transaction_time ≈ 0 — не эта причина"

      - id: memory.connection_leak
        title: Избыточные подключения / без pooler
        description: Высокий sessions за интервал при высоком max_connections.
        confirm_actions:
          - "dbstat.sessions vs max_connections"
          - "PgBouncer/pool mode, idle connections в pg_stat_activity"
        refute_actions:
          - "sessions стабильно низкий — не connection leak"

  high_wal:
    title: Высокая генерация WAL
    description: |
      Симптом: быстрый рост WAL, wal_buffers_full, частые checkpoints, replication lag.
    causes:
      - id: wal.high_generation_rate
        title: Высокая скорость генерации WAL (wal_bytes)
        description: wal_bytes / interval выше порога — общая write-нагрузка.
        confirm_actions:
          - "wal_stats: wal_bytes, wal_bytes_per_sec за интервал"
          - "Сравнить WAL MB/h между периодами (compare_runs / compare_nt_prod)"
        refute_actions:
          - "wal_bytes низкий за интервал — симптом мог быть кратковременным вне окна отчёта"

      - id: wal.wal_heavy_queries
        title: WAL-heavy SQL
        description: Топ SQL с высоким wal_bytes, wal_records, shared_blks_dirtied.
        confirm_actions:
          - "top_statements: wal_bytes, wal_fpi для топ запросов"
          - "EXPLAIN: массовые UPDATE/INSERT, TOAST, FPI"
        refute_actions:
          - "Топ SQL не содержит wal_bytes — WAL от batch/DDL/replication"

      - id: wal.high_dml_tables
        title: Write-heavy таблицы (DML volume)
        description: top_tables с высоким n_tup_ins/upd/del генерируют WAL.
        confirm_actions:
          - "top_tables: n_tup_ins, n_tup_upd, n_tup_del"
          - "Сопоставить таблицы с wal-heavy SQL"
        refute_actions:
          - "DML counters низкие — WAL не от OLTP DML"

      - id: wal.buffers_full
        title: Переполнение wal_buffers
        description: wal_buffers_full > 0 — процессы ждут WAL buffer.
        confirm_actions:
          - "wal_stats.wal_buffers_full"
          - "Увеличить wal_buffers на НТ и сравнить"
        refute_actions:
          - "wal_buffers_full = 0 — буферы достаточны"

      - id: wal.checkpoint_pressure
        title: Checkpoint pressure (requested checkpoints)
        description: Частые requested checkpoints из-за max_wal_size / write burst.
        confirm_actions:
          - "cluster_stats: checkpoints_req/timed, checkpoint_write_time"
          - "max_wal_size vs WAL generation rate"
        refute_actions:
          - "checkpoints_req низкий — checkpoint не лимитирует"

      - id: wal.small_max_wal_size
        title: Малый max_wal_size
        description: max_wal_size ниже рекомендуемого при текущей write-нагрузке.
        confirm_actions:
          - "settings.max_wal_size vs wal MB/h"
          - "Политика диска и replication"
        refute_actions:
          - "max_wal_size уже большой — причина в объёме записи, не в лимите"

  slow_query:
    title: Медленная работа запроса
    description: |
      Симптом: конкретный SQL выполняется медленно. Требуется указать запрос (hex ID, queryid или фрагмент текста).
    causes:
      - id: query.high_exec_time
        title: Высокое mean/max execution time
        description: Запрос найден в top_statements с elevated mean_exec_time или max_exec_time.
        confirm_actions:
          - "EXPLAIN (ANALYZE, BUFFERS) для целевого queryid"
          - "Сравнить mean_exec_time между периодами (compare_runs)"
        refute_actions:
          - "mean_exec_time низкий при жалобе — проблема intermittent или другой queryid"

      - id: query.io_bound
        title: I/O bound (shared read / io_time)
        description: Высокий shared_blks_read или io_time — чтение с диска доминирует.
        confirm_actions:
          - "top_statements: shared_blks_read, io_time, reads"
          - "top_io_tables / top_tables: seq_scan vs idx_scan на затронутых таблицах"
          - "Проверить индексы и ANALYZE статистику"
        refute_actions:
          - "shared_blks_read низкий при медленном запросе — не disk read bound"

      - id: query.seq_scan
        title: Sequential scan на большой таблице
        description: Запрос или связанные таблицы с высоким seq_scan.
        confirm_actions:
          - "EXPLAIN: Seq Scan на крупных таблицах"
          - "top_tables seq_scan vs idx_scan ratio"
          - "CREATE INDEX CONCURRENTLY на НТ"
        refute_actions:
          - "План использует Index Scan/Bitmap — seq scan не причина"

      - id: query.temp_spill
        title: Temp spill (sort/hash)
        description: temp_blks_written > 0 у целевого запроса.
        confirm_actions:
          - "EXPLAIN (ANALYZE): external sort/hash batches"
          - "Увеличить work_mem на роли для теста на НТ"
        refute_actions:
          - "temp_blks_written = 0 — не spill"

      - id: query.plan_regression
        title: Regression плана / высокий plan time
        description: Высокий mean_plan_time или частые replans (plans ≈ calls).
        confirm_actions:
          - "top_statements: mean_plan_time, plans vs calls"
          - "Проверить pg_stat_statements plans, generic vs custom plan"
          - "ANALYZE таблиц, сравнить план до/после"
        refute_actions:
          - "plan time << exec time — план стабилен"

      - id: query.cpu_bound
        title: CPU bound (kcache user/system time)
        description: Высокий sum_cpu_time на вызов в top_rusage_statements.
        confirm_actions:
          - "top_rusage_statements для hexqueryid: exec_user_time, exec_system_time"
          - "Профилирование функций, JIT, сложные expressions"
        refute_actions:
          - "sum_cpu_time низкий при долгом wall time — ждёт IO/lock"

      - id: query.wal_write_overhead
        title: Write-heavy (WAL / dirtied blocks)
        description: Запрос с высоким wal_bytes или shared_blks_dirtied.
        confirm_actions:
          - "wal_bytes, shared_blks_dirtied/written в top_statements"
          - "Batch size UPDATE/INSERT, триггеры"
        refute_actions:
          - "Read-only SELECT с высоким exec time — WAL не причина"

  high_temp:
    title: Высокий temp spill (временные файлы)
    description: |
      Симптом: рост temp files / temp_bytes, spill sort/hash на диск. pg_profile: dbstat.temp_*,
      top_statements.temp_blks_written / temp I/O time.
    causes:
      - id: temp.db_temp_bytes
        title: Temp на уровне БД (temp_bytes / temp_files)
        description: База пишет во временные файлы — нехватка work_mem или тяжёлые планы.
        confirm_actions:
          - "dbstat: temp_bytes, temp_files за интервал"
          - "Найти top SQL по temp_blks_written"
          - "Оценить work_mem на роли (не глобально без расчёта памяти)"
        refute_actions:
          - "temp_bytes≈0 и temp_files=0 — симптом не подтверждён в отчёте"

      - id: temp.sql_spill
        title: SQL с temp spill
        description: Топ-запросы с temp_blks_written / temp_blk_write_time.
        confirm_actions:
          - "EXPLAIN (ANALYZE, BUFFERS): external sort / hash batches"
          - "Увеличить work_mem точечно на НТ для проверки"
        refute_actions:
          - "temp_blks_written=0 у топ SQL — spill не в statements"

      - id: temp.work_mem_low
        title: Низкий / недостаточный work_mem
        description: Глобальный work_mem мал относительно объёма сортировок.
        confirm_actions:
          - "Сверить work_mem в settings с объёмом temp"
          - "Role-level work_mem для отчётных ролей"
        refute_actions:
          - "work_mem уже высок и temp всё равно растёт — проблема плана/объёма данных"

  bloat_vacuum_debt:
    title: Bloat / долг autovacuum
    description: |
      Симптом: высокий dead/mods %, stale vacuum, много vacuum ops, рост объектов.
    causes:
      - id: bloat.high_dead_pct
        title: Высокий dead_pct на таблицах
        description: Autovacuum не успевает за UPDATE/DELETE.
        confirm_actions:
          - "top_tbl_last_sample: dead_pct, n_dead_tup, last_autovacuum"
          - "Проверить idle in transaction"
        refute_actions:
          - "dead_pct низкий на горячих таблицах — не bloat"

      - id: bloat.stale_vacuum
        title: Stale / редкий vacuum
        description: Давно не было autovacuum при активности.
        confirm_actions:
          - "last_autovacuum vs mods_pct / DML"
          - "Ускорить cost_limit / снизить cost_delay / naptime"
        refute_actions:
          - "last_autovacuum свежий — ищите другую причину latency"

      - id: bloat.vacuum_ops_pressure
        title: Высокий счётчик vacuum/analyze ops
        description: Много операций vacuum конкурирует с нагрузкой.
        confirm_actions:
          - "top_tables: vacuum_count / autovacuum_count"
          - "Согласовать окно обслуживания"
        refute_actions:
          - "vacuum ops низкие — давление не от частоты vacuum"

      - id: bloat.growth
        title: Быстрый рост таблиц/индексов
        description: growth_pretty заметный за интервал отчёта.
        confirm_actions:
          - "pg_profile top growing tables/indexes"
          - "Partitioning / архивация / unused indexes"
        refute_actions:
          - "growth мал — не диск/рост объект"

  connection_pressure:
    title: Давление на соединения
    description: |
      Симптом: много sessions относительно max_connections, idle/idle-in-xact, риск исчерпания слотов.
    causes:
      - id: conn.high_utilization
        title: Высокая утилизация max_connections
        description: sessions близко к max_connections.
        confirm_actions:
          - "dbstat.sessions vs settings.max_connections"
          - "Внедрить/проверить PgBouncer"
        refute_actions:
          - "sessions << max_connections — не утилизация пула"

      - id: conn.idle_in_transaction
        title: Idle in transaction удерживает слоты
        description: Долгий idle in transaction + отсутствие таймаута.
        confirm_actions:
          - "idle_in_transaction_time; idle_in_transaction_session_timeout"
          - "Найти приложение без COMMIT"
        refute_actions:
          - "idle in xact низкий — слоты заняты active/idle"

      - id: conn.no_pooler_hint
        title: Высокий max_connections без pooler-паттерна
        description: max_connections завышен — типичный признак отсутствия pooler.
        confirm_actions:
          - "Сверить max_connections с реальным peak и политикой pooler"
          - "Оценить память backends (work_mem × ops)"
        refute_actions:
          - "max_connections умеренный и peak стабилен — ок"

thresholds:
  high_cpu:
    min_sum_cpu_sec_suspected: 300
    min_sum_cpu_sec_confirmed: 1200
    min_user_time_pct: 3.0
    top_n: 5
    min_calls_volume: 100000
  high_memory:
    temp_bytes_mb_suspected: 100
    temp_blks_written_suspected: 10000
    min_work_mem_connections_gb: 8
  high_wal:
    wal_mb_per_hour_suspected: 500
    wal_mb_per_hour_confirmed: 2000
    wal_heavy_gb_suspected: 1
  slow_query:
    mean_exec_ms_suspected: 100
    mean_exec_ms_confirmed: 1000
    io_time_ms_suspected: 500
    shared_blks_read_suspected: 100000
  high_temp:
    temp_bytes_mb_suspected: 50
    temp_bytes_mb_confirmed: 200
    temp_blks_written_suspected: 5000
  bloat_vacuum_debt:
    dead_pct_suspected: 10.0
    dead_pct_confirmed: 20.0
    min_vacuum_ops: 30
    min_growth_mb: 50
  connection_pressure:
    util_pct_suspected: 70.0
    util_pct_confirmed: 90.0
    idle_in_xact_sec: 1800
    max_connections_high: 300
