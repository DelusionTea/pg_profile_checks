# GUC change → likely impact on metrics and symptoms (for NT multi-run analysis).
# used_by: pgprofile_nt_runs.infer_guc_impacts

guc_impact:
  max_wal_size:
    symptoms: [high_wal, high_cpu]
    metrics: [checkpoints_req, checkpoint_write_time, wal_buffers_full, wal_bytes, wal_size]
    increased_improves: [checkpoints_req, checkpoint_write_time]
    narrative_increase: |
      Увеличение max_wal_size снижает частоту requested checkpoints при высокой WAL generation.
    narrative_decrease: |
      Уменьшение max_wal_size усиливает requested checkpoints и IO-пики checkpoint.

  wal_buffers:
    symptoms: [high_wal, high_cpu]
    metrics: [wal_buffers_full, wal_bytes, wal_sync, wal_write]
    increased_improves: [wal_buffers_full]
    narrative_increase: |
      Увеличение wal_buffers снижает ожидание освобождения WAL buffer (wal_buffers_full).
    narrative_decrease: |
      Уменьшение wal_buffers может повысить wal_buffers_full и latency commit.

  shared_buffers:
    symptoms: [high_cpu, high_memory]
    metrics: [blks_hit_pct, blks_read, blk_read_time, blk_write_time]
    increased_improves: [blks_hit_pct]
    increased_worsens: [blks_read, blk_read_time]
    narrative_increase: |
      Увеличение shared_buffers повышает cache hit и снижает физические чтения (CPU/IO).
    narrative_decrease: |
      Уменьшение shared_buffers снижает cache hit и увеличивает чтения с диска.

  checkpoint_completion_target:
    symptoms: [high_wal, high_cpu]
    metrics: [checkpoint_write_time, checkpoint_sync_time, checkpoints_req]
    increased_improves: [checkpoint_write_time]
    narrative_increase: |
      Более высокий checkpoint_completion_target растягивает checkpoint во времени и сглаживает IO spikes.
    narrative_decrease: |
      Более низкий checkpoint_completion_target укорачивает окно записи checkpoint — возможны IO spikes.

  checkpoint_timeout:
    symptoms: [high_wal]
    metrics: [checkpoints_timed, checkpoints_req, checkpoint_write_time]
    narrative_increase: |
      Увеличение checkpoint_timeout снижает долю timed checkpoints при стабильной write-нагрузке.
    narrative_decrease: |
      Уменьшение checkpoint_timeout повышает частоту timed checkpoints.

  effective_cache_size:
    symptoms: [high_cpu]
    metrics: [blks_hit_pct, blk_read_time]
    narrative_increase: |
      Увеличение effective_cache_size влияет на планы (index vs seq scan), не выделяет память.
    narrative_decrease: |
      Уменьшение effective_cache_size может ухудшить выбор планов.

  work_mem:
    symptoms: [high_cpu, high_memory]
    metrics: [temp_blks_written, blk_read_time]
    narrative_increase: |
      Увеличение work_mem снижает spill в temp, но повышает риск OOM при параллельных sorts.
    narrative_decrease: |
      Уменьшение work_mem повышает temp spill и CPU/IO на сортировках.

  maintenance_work_mem:
    symptoms: [high_cpu]
    metrics: [checkpoint_write_time]
    narrative_increase: |
      Увеличение maintenance_work_mem ускоряет VACUUM и maintenance в окне обслуживания.

  idle_in_transaction_session_timeout:
    symptoms: [high_cpu, high_memory]
    metrics: [idle_in_transaction_time]
    enabled_improves: [idle_in_transaction_time]
    narrative_enable: |
      Включение idle_in_transaction_session_timeout снижает idle in transaction и блокировку vacuum.
    narrative_disable: |
      Отключение (0) idle_in_transaction_session_timeout усиливает idle in transaction.

  huge_pages:
    symptoms: [high_cpu, high_memory]
    metrics: [blk_read_time, blks_hit_pct, shared_buffers]
    enabled_improves: [tlb_overhead, cpu_system_time]
    narrative_enable: |
      Включение huge_pages=on (после vm.nr_hugepages ≥ shared_memory_size_in_huge_pages)
      снижает TLB pressure и system CPU на большом shared_buffers (Postgres Pro kernel-resources).
      try→on устраняет тихий fallback на 4kB страницы.
    narrative_disable: |
      huge_pages=off/try без зарезервированных страниц оставляет shared memory на 4kB —
      выше TLB miss и потенциально выше system CPU при крупном shared_buffers.

  autovacuum:
    symptoms: [high_cpu, high_memory, bloat_vacuum_debt]
    metrics: [dead_pct, n_dead_tup]
    enabled_improves: [dead_pct, n_dead_tup]
    narrative_enable: |
      Включение autovacuum=on обязательно для production OLTP — снижает bloat и риск wraparound.
    narrative_disable: |
      autovacuum=off — критическая misconfiguration: рост dead tuples и деградация планов.

  autovacuum_naptime:
    symptoms: [high_cpu, high_memory, bloat_vacuum_debt]
    metrics: [dead_pct, n_dead_tup, last_autovacuum]
    decreased_improves: [dead_pct, n_dead_tup]
    narrative_decrease: |
      Уменьшение autovacuum_naptime ускоряет реакцию launcher на bloat (больше фонового IO).
    narrative_increase: |
      Увеличение naptime замедляет запуск vacuum — dead tuples и mods% могут расти дольше.

  autovacuum_vacuum_cost_delay:
    symptoms: [high_cpu, high_memory, bloat_vacuum_debt]
    metrics: [dead_pct, n_dead_tup, blk_write_time]
    decreased_improves: [dead_pct, n_dead_tup]
    narrative_decrease: |
      Снижение cost_delay ускоряет autovacuum ценой дополнительного IO.
    narrative_increase: |
      Рост cost_delay «душит» vacuum — риск накопления bloat на write-heavy таблицах.

  autovacuum_vacuum_cost_limit:
    symptoms: [high_cpu, high_memory, bloat_vacuum_debt]
    metrics: [dead_pct, n_dead_tup, blk_write_time]
    increased_improves: [dead_pct, n_dead_tup]
    narrative_increase: |
      Увеличение cost_limit даёт vacuum больший IO-бюджет за цикл — быстрее очистка.
    narrative_decrease: |
      Снижение cost_limit замедляет autovacuum на busy системах.

  statement_timeout:
    symptoms: [slow_query, high_cpu]
    metrics: [max_exec_time, total_exec_time]
    enabled_improves: [runaway_queries]
    narrative_enable: |
      Ненулевой statement_timeout обрезает runaway queries (лучше задавать на роли).
    narrative_disable: |
      statement_timeout=0 убирает защиту от бесконечных запросов.

  lock_timeout:
    symptoms: [slow_query, high_cpu]
    metrics: [deadlocks, idle_in_transaction_time]
    enabled_improves: [lock_waits]
    narrative_enable: |
      lock_timeout ограничивает ожидание блокировок и снижает каскадные задержки OLTP.
    narrative_disable: |
      lock_timeout=0 позволяет сессиям ждать блокировку бесконечно.

  max_connections:
    symptoms: [high_memory, connection_pressure]
    metrics: [session_time, idle_in_transaction_time, blks_hit_pct]
    decreased_improves: [memory_pressure]
    narrative_increase: |
      Рост max_connections без pooler увеличивает память на backends и риск OOM (work_mem × ops).
    narrative_decrease: |
      Снижение max_connections после внедрения pooler снижает давление на память и процессы.

  random_page_cost:
    symptoms: [slow_query, high_cpu]
    metrics: [seq_scan, idx_scan, blk_read_time]
    decreased_improves: [seq_scan]
    narrative_decrease: |
      На SSD снижение random_page_cost (1.1–2) чаще склоняет планировщик к index scan.
    narrative_increase: |
      Высокий random_page_cost благоприятствует seq scan — на HDD иногда оправдано.

  effective_io_concurrency:
    symptoms: [slow_query, high_cpu]
    metrics: [blk_read_time, blks_read]
    increased_improves: [blk_read_time]
    narrative_increase: |
      Рост effective_io_concurrency на SSD улучшает prefetch bitmap/index scans.
    narrative_decrease: |
      Низкий effective_io_concurrency недоиспользует параллельный prefetch на быстром storage.

  min_wal_size:
    symptoms: [high_wal]
    metrics: [checkpoints_req, wal_bytes, wal_size]
    increased_improves: [checkpoints_req]
    narrative_increase: |
      Увеличение min_wal_size вместе с max_wal_size снижает «пилу» resize WAL и частые checkpoints.
    narrative_decrease: |
      Малый min_wal_size при переменной нагрузке может учащать recycle/resize WAL.

  wal_compression:
    symptoms: [high_wal]
    metrics: [wal_bytes, wal_write, wal_sync]
    enabled_improves: [wal_bytes]
    narrative_enable: |
      wal_compression снижает объём WAL ценой CPU на compress/decompress.
    narrative_disable: |
      Отключение wal_compression увеличивает объём WAL при той же DML-нагрузке.

  jit:
    symptoms: [high_cpu, slow_query]
    metrics: [jit_compilation_time, total_exec_time, mean_exec_time]
    disabled_improves: [jit_compilation_time]
    narrative_enable: |
      JIT может ускорять тяжёлые аналитические запросы, но на коротком OLTP даёт compile overhead.
    narrative_disable: |
      Отключение JIT (или повышение jit_*_cost) снижает CPU на compile для коротких OLTP SQL.

  max_parallel_workers_per_gather:
    symptoms: [high_cpu, slow_query]
    metrics: [total_exec_time, user_time, system_time]
    narrative_increase: |
      Больше parallel workers ускоряет тяжёлые gather-запросы, но суммарно поднимает CPU кластера.
    narrative_decrease: |
      Снижение parallel workers уменьшает aggregate CPU на OLTP с частыми параллельными планами.

  bgwriter_lru_maxpages:
    symptoms: [high_cpu, high_wal]
    metrics: [buffers_clean, maxwritten_clean, checkpoint_write_time]
    increased_improves: [maxwritten_clean]
    narrative_increase: |
      Больше bgwriter_lru_maxpages помогает очищать dirty buffers до checkpoint (меньше backend writes).
    narrative_decrease: |
      Малый lru_maxpages повышает maxwritten_clean и долю backend writes.
